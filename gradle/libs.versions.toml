[versions]
agp = "9.0.1"
androidTools = "32.0.0"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.13.0"
kotlin = "2.3.20"
composeBom = "2026.03.01"
appcompat = "1.7.1"
camerax = "1.6.0"
navigation3 = "1.0.1"
mockk = "1.14.9"
